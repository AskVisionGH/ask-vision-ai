<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vision — Talk to Solana.</title>
    <meta name="description" content="Talk to Solana. Vision turns words into on-chain action.">
    <meta name="author" content="Vision" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="shortcut icon" href="/favicon.png" type="image/png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Vision">
    <meta property="og:description" content="Talk to Solana.">
    <meta property="og:image" content="/og-vision.jpg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vision">
    <meta name="twitter:description" content="Talk to Solana.">
    <meta name="twitter:image" content="/og-vision.jpg">
</head>

  <body>
    <div id="root">
      <!-- Fallback shown only if the JS bundle fails to mount (e.g. iOS < 14
           in-app browsers that can't parse modern syntax). React replaces
           this entire subtree on mount, so users on supported devices never
           see it. -->
      <noscript>
        <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; max-width: 480px; margin: 40px auto; text-align: center; color: #e5e7eb; background: #0a0a0a;">
          <h1 style="font-size: 18px; margin-bottom: 12px;">JavaScript required</h1>
          <p style="font-size: 14px; line-height: 1.5; opacity: 0.8;">Vision needs JavaScript to run. Please enable it in your browser settings.</p>
        </div>
      </noscript>
      <div id="boot-fallback" style="display: none; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px; max-width: 480px; margin: 40px auto; text-align: center; color: #e5e7eb; background: #0a0a0a; border-radius: 12px;">
        <h1 style="font-size: 18px; margin-bottom: 12px; font-weight: 600;">Vision can't load on this browser</h1>
        <p style="font-size: 14px; line-height: 1.5; opacity: 0.85; margin-bottom: 16px;">
          You may be using an in-app browser (X, Instagram, Discord) on an older iOS version. Vision requires <strong>iOS 14 or newer</strong>.
        </p>
        <p style="font-size: 13px; line-height: 1.5; opacity: 0.7;">
          Try opening this page in <strong>Safari</strong> or <strong>Chrome</strong> directly, or update your device to iOS 14+.
        </p>
      </div>
      <script>
        // Show the compatibility hint only if React truly failed to mount.
        // We check after 10s (covers slow networks / dev rebuilds) and verify
        // that #root is still empty — React replaces children on mount, so a
        // populated root means the app is alive even if our timer survived.
        setTimeout(function () {
          var root = document.getElementById('root');
          var fallback = document.getElementById('boot-fallback');
          if (!fallback || !root) return;
          // If #root has any children other than the fallback itself, React mounted.
          var mounted = false;
          for (var i = 0; i < root.children.length; i++) {
            if (root.children[i].id !== 'boot-fallback') { mounted = true; break; }
          }
          if (!mounted) fallback.style.display = 'block';
        }, 10000);
      </script>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
